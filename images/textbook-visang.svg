<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&amp;display=swap');
      text { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; }
    </style>
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A9EDB"/>
      <stop offset="100%" stop-color="#1E5FA0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="560" fill="#FFFFFF"/>
  
  <!-- Top accent bar -->
  <rect x="0" y="0" width="400" height="6" fill="#1E5FA0"/>
  
  <!-- Network Lines -->
  <g stroke="#BDD9EF" stroke-width="1" opacity="0.6">
    <line x1="200" y1="200" x2="320" y2="160"/>
    <line x1="320" y1="160" x2="350" y2="300"/>
    <line x1="350" y1="300" x2="280" y2="400"/>
    <line x1="200" y1="200" x2="280" y2="400"/>
    <line x1="320" y1="160" x2="280" y2="260"/>
    <line x1="280" y1="260" x2="350" y2="300"/>
    <line x1="200" y1="200" x2="280" y2="260"/>
    <line x1="280" y1="260" x2="280" y2="400"/>
    <line x1="280" y1="260" x2="370" y2="380"/>
    <line x1="350" y1="300" x2="370" y2="380"/>
    <line x1="280" y1="400" x2="370" y2="380"/>
    <line x1="200" y1="200" x2="240" y2="320"/>
    <line x1="240" y1="320" x2="280" y2="400"/>
    <line x1="240" y1="320" x2="280" y2="260"/>
  </g>
  
  <!-- Network Nodes (large) -->
  <circle cx="350" cy="300" r="55" fill="#1E5FA0" opacity="0.15"/>
  <circle cx="350" cy="300" r="38" fill="#2E7BC0" opacity="0.25"/>
  <circle cx="350" cy="300" r="22" fill="url(#nodeGrad)" opacity="0.9"/>
  
  <circle cx="280" cy="400" r="38" fill="#1E5FA0" opacity="0.12"/>
  <circle cx="280" cy="400" r="22" fill="#3A8FD0" opacity="0.7"/>
  <circle cx="280" cy="400" r="10" fill="#1E5FA0"/>
  
  <!-- Network Nodes (medium) -->
  <circle cx="320" cy="160" r="16" fill="#2E7BC0" opacity="0.85"/>
  <circle cx="320" cy="160" r="7" fill="white"/>
  
  <circle cx="280" cy="260" r="12" fill="#1E5FA0" opacity="0.9"/>
  <circle cx="280" cy="260" r="5" fill="white"/>
  
  <circle cx="370" cy="380" r="10" fill="#3A8FD0" opacity="0.8"/>
  <circle cx="240" cy="320" r="8" fill="#1E5FA0" opacity="0.7"/>
  <circle cx="200" cy="200" r="8" fill="#5AAAE0" opacity="0.6"/>
  
  <!-- Small orbital ring -->
  <circle cx="350" cy="300" r="70" fill="none" stroke="#BDD9EF" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.4"/>
  <circle cx="350" cy="300" r="90" fill="none" stroke="#BDD9EF" stroke-width="0.5" stroke-dasharray="2,8" opacity="0.25"/>
  
  <!-- Text: Subject -->
  <text x="40" y="130" font-size="58" font-weight="900" fill="#1E3A5F" letter-spacing="-1">과학</text>
  
  <!-- Text: Course level -->
  <text x="40" y="170" font-size="18" font-weight="400" fill="#555">통합과학 1</text>
  
  <!-- Divider -->
  <rect x="40" y="190" width="60" height="2" fill="#1E5FA0"/>
  
  <!-- Text: Publisher -->
  <text x="40" y="218" font-size="13" font-weight="400" fill="#888">비상교육</text>
  
  <!-- Bottom section -->
  <rect x="0" y="490" width="400" height="70" fill="#F5F8FC"/>
  
  <!-- Text: Curriculum info -->
  <text x="40" y="520" font-size="11" font-weight="400" fill="#666">2022 개정 교육과정</text>
  <text x="40" y="540" font-size="11" font-weight="700" fill="#1E5FA0">비상교육 ·  검정 교과서</text>
</svg>
