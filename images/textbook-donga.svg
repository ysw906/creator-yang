<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <!-- Background: deep navy -->
  <rect width="400" height="560" fill="#0D1B2E"/>
  
  <!-- Stars background -->
  <circle cx="50" cy="80" r="1" fill="white" opacity="0.6"/>
  <circle cx="90" cy="40" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="130" cy="100" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="170" cy="55" r="0.7" fill="white" opacity="0.7"/>
  <circle cx="60" cy="150" r="0.9" fill="white" opacity="0.3"/>
  <circle cx="120" cy="200" r="1" fill="white" opacity="0.5"/>
  <circle cx="30" cy="250" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="80" cy="300" r="1.1" fill="white" opacity="0.3"/>
  <circle cx="150" cy="180" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="200" cy="230" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="40" cy="380" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="110" cy="420" r="0.7" fill="white" opacity="0.3"/>
  <circle cx="180" cy="350" r="1" fill="white" opacity="0.4"/>
  <circle cx="260" cy="80" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="310" cy="50" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="370" cy="130" r="1" fill="white" opacity="0.4"/>
  <circle cx="340" cy="200" r="0.7" fill="white" opacity="0.3"/>
  <circle cx="290" cy="140" r="1.1" fill="white" opacity="0.5"/>
  <circle cx="380" cy="280" r="0.8" fill="white" opacity="0.4"/>
  
  <!-- Galaxy spiral (left) -->
  <ellipse cx="100" cy="380" rx="55" ry="20" fill="none" stroke="#6B8CAE" stroke-width="6" opacity="0.15" transform="rotate(-25, 100, 380)"/>
  <ellipse cx="100" cy="380" rx="35" ry="12" fill="none" stroke="#8AADD0" stroke-width="4" opacity="0.2" transform="rotate(-25, 100, 380)"/>
  <ellipse cx="100" cy="380" rx="18" ry="6" fill="none" stroke="#AACAE0" stroke-width="3" opacity="0.25" transform="rotate(-25, 100, 380)"/>
  <circle cx="100" cy="380" r="4" fill="#D0E8FF" opacity="0.7"/>
  <circle cx="100" cy="380" r="12" fill="#6B8CAE" opacity="0.1"/>
  
  <!-- Galaxy spiral (right, smaller) -->
  <ellipse cx="330" cy="440" rx="40" ry="15" fill="none" stroke="#6B8CAE" stroke-width="4" opacity="0.12" transform="rotate(15, 330, 440)"/>
  <ellipse cx="330" cy="440" rx="22" ry="8" fill="none" stroke="#8AADD0" stroke-width="3" opacity="0.18" transform="rotate(15, 330, 440)"/>
  <circle cx="330" cy="440" r="3" fill="#C0D8F0" opacity="0.6"/>
  
  <!-- DNA Double Helix (center-right) -->
  <g transform="translate(240, 80)">
    <!-- Strand 1 -->
    <path d="M 40 0 C 70 50, 10 100, 40 150 C 70 200, 10 250, 40 300 C 70 350, 10 400, 40 440" 
          fill="none" stroke="#C8A84B" stroke-width="2.5" opacity="0.8"/>
    <!-- Strand 2 -->
    <path d="M 80 0 C 50 50, 110 100, 80 150 C 50 200, 110 250, 80 300 C 50 350, 110 400, 80 440" 
          fill="none" stroke="#C8A84B" stroke-width="2.5" opacity="0.8"/>
    <!-- Cross links -->
    <line x1="40" y1="30" x2="80" y2="30" stroke="#D4B85A" stroke-width="1.5" opacity="0.7"/>
    <line x1="22" y1="75" x2="98" y2="75" stroke="#D4B85A" stroke-width="1.5" opacity="0.7"/>
    <line x1="40" y1="120" x2="80" y2="120" stroke="#D4B85A" stroke-width="1.5" opacity="0.7"/>
    <line x1="22" y1="165" x2="98" y2="165" stroke="#D4B85A" stroke-width="1.5" opacity="0.7"/>
    <line x1="40" y1="210" x2="80" y2="210" stroke="#D4B85A" stroke-width="1.5" opacity="0.7"/>
    <line x1="22" y1="255" x2="98" y2="255" stroke="#D4B85A" stroke-width="1.5" opacity="0.7"/>
    <line x1="40" y1="300" x2="80" y2="300" stroke="#D4B85A" stroke-width="1.5" opacity="0.7"/>
    <line x1="22" y1="345" x2="98" y2="345" stroke="#D4B85A" stroke-width="1.5" opacity="0.7"/>
    <line x1="40" y1="390" x2="80" y2="390" stroke="#D4B85A" stroke-width="1.5" opacity="0.7"/>
  </g>
  
  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="400" height="5" fill="#C8A84B"/>
  
  <!-- Text: Subject -->
  <text x="40" y="130" font-size="64" font-weight="900" fill="#FFFFFF" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" letter-spacing="-2">과학</text>
  
  <!-- Text: Course level -->
  <text x="42" y="165" font-size="17" font-weight="400" fill="#8AADD0" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">통합과학 1</text>
  
  <!-- Gold divider -->
  <rect x="40" y="185" width="50" height="2" fill="#C8A84B"/>
  
  <!-- Text: Publisher -->
  <text x="40" y="210" font-size="14" font-weight="400" fill="#9DBBD4" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">동아출판</text>
  
  <!-- Bottom section -->
  <rect x="0" y="500" width="400" height="60" fill="#0A1525"/>
  <rect x="0" y="500" width="400" height="2" fill="#C8A84B" opacity="0.5"/>
  
  <!-- Bottom text -->
  <text x="40" y="525" font-size="11" font-weight="400" fill="#6B8CAE" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">2022 개정 교육과정</text>
  <text x="40" y="545" font-size="11" font-weight="700" fill="#C8A84B" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif">동아출판  ·  검정 교과서</text>
</svg>
